<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <div>
      <div class="header-logo">SCOUT</div>
      <div class="header-sub">Navitas AI Labs · Candidate Fit Scorer</div>
    </div>
    <div class="header-right">
      <span class="source-badge" id="source-badge">—</span>
      <button class="close-btn" id="refresh-btn" title="Re-scan profile">⟳</button>
      <button class="close-btn" id="close-btn" title="Close">✕</button>
    </div>
  </div>

  <div id="main-view">
    <div class="body">

      <!-- Profile card (hidden until profile is read) -->
      <div class="profile-card" id="profile-card">
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-title" id="profile-title"></div>
        <div class="profile-meta">
          <span id="profile-location"></span>
          <span id="profile-exp"></span>
        </div>
        <div class="profile-contact">
          <a class="profile-email" id="profile-email"></a>
          <a class="profile-phone" id="profile-phone"></a>
        </div>
      </div>

      <div class="status" id="status"></div>

      <!-- Hidden until profile is confirmed loaded -->
      <div id="match-section" style="display:none">

        <!-- JD dropdown -->
        <div class="jd-section">
          <div class="section-label">Match to Job Description</div>
          <div class="jd-wrap">
            <select class="jd-select" id="jd-select" disabled>
              <option value="">Loading jobs…</option>
            </select>
            <span class="jd-spinner" id="jd-spinner"></span>
          </div>
        </div>

        <!-- Score card -->
        <div class="score-card" id="score-card">
          <div class="score-heading" id="score-heading" style="display:none">Updated Score</div>
          <div class="score-circle" id="score-circle">
            <span class="score-number" id="score-number">—</span>
            <small>/100</small>
          </div>
          <div class="score-info">
            <div class="score-label" id="score-label">—</div>
            <div class="score-rationale" id="score-rationale">—</div>
          </div>
        </div>

        <!-- Optional resume upload — appears once score is ready -->
        <div class="resume-upload" id="resume-upload" style="display:none">
          <div class="resume-label">Attach Resume <span class="resume-hint">optional · PDF / DOC / DOCX</span></div>
          <div class="resume-row">
            <label class="resume-pick-btn" for="resume-file">Choose file</label>
            <span class="resume-name" id="resume-name">No file chosen</span>
            <button class="resume-clear" id="resume-clear" style="display:none" title="Remove">✕</button>
          </div>
          <input type="file" id="resume-file" accept=".pdf,.doc,.docx,.odt,.rtf,.txt" style="display:none" />
        </div>

        <button class="btn btn-primary" id="add-btn" disabled>Add to SCOUT</button>

        <a class="btn btn-jazzhr" id="jazzhr-btn" target="_blank" style="display:none">
          View in JazzHR →
        </a>

        <!-- AI phone screen — appears after candidate is added to SCOUT -->
        <div class="vapi-section" id="vapi-section" style="display:none">
          <div class="vapi-phone-row" id="vapi-phone-row" style="display:none">
            <input class="vapi-phone-input" id="vapi-phone-input" type="tel"
              placeholder="Enter phone  e.g. +1 555 000 1234" />
          </div>
          <button class="btn btn-vapi" id="vapi-btn">📞 Call with AI</button>
          <div class="vapi-status" id="vapi-status" style="display:none"></div>
          <div class="vapi-result" id="vapi-result" style="display:none"></div>
        </div>

      </div>
    </div>

    <div class="dev-bar">
      <span>DEV</span>
      <label>
        <input type="checkbox" id="mock-duplicate" />
        Mock "Already in SCOUT"
      </label>
    </div>
  </div>

  <div id="empty-view" style="display:none">
    <div class="empty-state">
      <strong>No candidate profile detected</strong>
      <p>Open a candidate profile on<br><b>LinkedIn</b> to use SCOUT.</p>
    </div>
  </div>

  <div class="footer">SCOUT · Navitas AI Labs</div>

  <!-- Résumé text parsers (local, no network): PDF.js + fflate (DOCX unzip) -->
  <script src="../lib/pdf.min.js"></script>
  <script src="../lib/fflate.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
