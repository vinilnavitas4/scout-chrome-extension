<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <div>
      <div class="header-logo">SCOUT</div>
      <div class="header-sub">Navitas AI Labs · Candidate Fit Scorer</div>
    </div>
    <span class="source-badge" id="source-badge">—</span>
  </div>

  <div id="main-view">
    <div class="body">

      <!-- Profile card (hidden until profile is read) -->
      <div class="profile-card" id="profile-card">
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-title" id="profile-title"></div>
        <div class="profile-meta">
          <span id="profile-location"></span>
          <span id="profile-exp"></span>
        </div>
      </div>

      <div class="status" id="status"></div>

      <!-- Hidden until profile is confirmed loaded -->
      <div id="match-section" style="display:none">

        <!-- JD dropdown -->
        <div class="jd-section">
          <div class="section-label">Match to Job Description</div>
          <div class="jd-wrap">
            <select class="jd-select" id="jd-select" disabled>
              <option value="">Loading jobs…</option>
            </select>
            <span class="jd-spinner" id="jd-spinner"></span>
          </div>
        </div>

        <!-- Score card -->
        <div class="score-card" id="score-card">
          <div class="score-circle" id="score-circle">
            <span class="score-number" id="score-number">—</span>
            <small>/100</small>
          </div>
          <div class="score-info">
            <div class="score-label" id="score-label">—</div>
            <div class="score-rationale" id="score-rationale">—</div>
          </div>
        </div>

        <button class="btn btn-primary" id="add-btn" disabled>Add to SCOUT</button>

        <a class="btn btn-jazzhr" id="jazzhr-btn" target="_blank" style="display:none">
          View in JazzHR →
        </a>

      </div>
    </div>

    <div class="dev-bar">
      <span>DEV</span>
      <label>
        <input type="checkbox" id="mock-duplicate" />
        Mock "Already in SCOUT"
      </label>
    </div>
  </div>

  <div id="empty-view" style="display:none">
    <div class="empty-state">
      <strong>No candidate profile detected</strong>
      <p>Open a candidate profile on<br><b>Dice.com</b> or <b>LinkedIn</b> to use SCOUT.</p>
    </div>
  </div>

  <div class="footer">SCOUT · Navitas AI Labs</div>

  <script src="popup.js"></script>
</body>
</html>
